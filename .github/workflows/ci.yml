name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install wazootech-wiki
      - run: wiki -c wiki.yaml check --strict
      - run: wiki -c wiki.yaml lint --strict
      - run: bash scripts/sync-docs.sh
      - run: test -f docs/Alice_Chen.mdx
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npx vite build

  deploy:
    if: github.ref_name == 'main' || github.ref_name == 'master'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      deployments: write
      statuses: write
    environment:
      name: Holocron
      url: ${{ steps.deploy.outputs.holocron_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install wazootech-wiki
      - run: bash scripts/sync-docs.sh
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - name: Deploy to Holocron
        id: deploy
        run: npx @holocron.so/cli deploy
      - name: Set commit status
        if: steps.deploy.outputs.holocron_url
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.sha }} \
            -f state=success \
            -f target_url="${{ steps.deploy.outputs.holocron_url }}" \
            -f description="Docs website deployment" \
            -f context=Holocron
